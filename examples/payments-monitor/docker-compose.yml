services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: mimic
      POSTGRES_PASSWORD: mimic
      POSTGRES_DB: mimic_payments
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mimic -d mimic_payments"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
