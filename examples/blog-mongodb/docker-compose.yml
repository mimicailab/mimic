services:
  mongodb:
    image: mongo:7
    environment:
      MONGO_INITDB_DATABASE: mimic_blog
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  mongodata:
